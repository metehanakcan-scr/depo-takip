{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 1000px;">
    
    <div style="margin-bottom: 25px;">
        <h2 style="margin: 0; font-size: 1.4rem;">📊 GENEL DURUM ÖZETİ</h2>
        <p style="color: #64748b; font-size: 12px; margin-top: 5px;">DEPO VE STOK SEVİYELERİNİN ANLIK GÖRÜNÜMÜ</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
        <div class="card" style="border-left: 5px solid var(--primary); padding: 20px; margin-bottom: 0;">
            <label style="margin-bottom: 5px; color: var(--primary);">📦 ÜRÜN ÇEŞİDİ</label>
            <h2 style="font-size: 1.8rem; margin: 10px 0; font-weight: 800;">{{ istatistik.cesit }}</h2>
            <small style="color: #94a3b8; font-size: 11px;">KAYITLI FARKLI BARKOD</small>
        </div>
        
        <div class="card" style="border-left: 5px solid var(--success); padding: 20px; margin-bottom: 0;">
            <label style="margin-bottom: 5px; color: var(--success);">📈 TOPLAM ADET</label>
            <h2 style="font-size: 1.8rem; margin: 10px 0; font-weight: 800;">{{ istatistik.adet }}</h2>
            <small style="color: #94a3b8; font-size: 11px;">DEPODAKİ TOPLAM ÜRÜN</small>
        </div>
        
        <div class="card" style="border-left: 5px solid var(--danger); padding: 20px; margin-bottom: 0;">
            <label style="margin-bottom: 5px; color: var(--danger);">⚠️ KRİTİK STOK</label>
            <h2 style="font-size: 1.8rem; margin: 10px 0; font-weight: 800; color: var(--danger);">{{ istatistik.kritik }}</h2>
            <small style="color: #94a3b8; font-size: 11px;">10 ADET ALTI ÜRÜNLER</small>
        </div>
    </div>

    

</div>
{% endblock %}
