{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 700px; margin: 0 auto; border-top: 8px solid #dc2626;">
    
    <h2 style="margin-top:0; color:#dc2626; font-size: 1.6rem; letter-spacing: -1px;">
        📤 Ürün Çıkış İşlemi
    </h2>

    <p style="color:#64748b; margin-bottom:20px; font-weight: 500;">
        Sistemden ürün düşmek için barkod okutun veya listeden seçin.
    </p>

    <div style="display:flex; gap:10px; align-items:flex-end; margin-bottom:20px;">

        <div style="flex:1;">

            <label style="color:#475569;">
                ÜRÜN KODU / BARKOD
            </label>

            <select id="u" style="width:100%;">

                <option value=""></option>

                {% for u in urunler %}

                <option 
                    value="{{ u.barkod }}"
                    data-isim="{{ u.isim }}"
                    data-lot="{{ u.lot if u.lot else '-' }}"
                    data-stok="{{ u.miktar }}"
                >
                    {{ u.isim }} 
                    --- LOT: {{ u.lot if u.lot else '-' }}
                    
                </option>

                {% endfor %}
            </select>
        </div>

        <button 
            onclick="kameraAc()"
            class="btn"
            style="
                background:#4f46e5;
                color:white;
                height:40px;
                padding:0 15px;
                border-radius:10px;
                border:none;
                font-weight:800;
                cursor:pointer;
            "
        >
            📷 TARA
        </button>

    </div>

    <div id="reader-wrapper">

        <div id="reader"></div>

        <button 
            id="flashBtn"
            onclick="flashDegistir()"
        >
            💡 Flash Aç
        </button>

        <button 
            id="zoomBtn"
            onclick="zoomDegistir()"
        >
            🔍 2x
        </button>

    </div>

    <div style="
        display:grid;
        grid-template-columns:1.5fr 1.5fr;
        gap:12px;
        margin-bottom:20px;
        background:#fef2f2;
        padding:15px;
        border-radius:12px;
        border:1px solid #fee2e2;
    ">

        <div>

            <label style="
                font-size:11px;
                color:#991b1b;
                font-weight:800;
            ">
                ÜRÜN TANIMI
            </label>

            <select 
                id="goster_isim"
                style="
                    background:transparent;
                    border:none;
                    border-bottom:2px solid #e9b1b1;
                    font-weight:800;
                    color:#1e293b;
                    margin-bottom:0;
                    padding-left:0;
                    border-radius:0;
                    width:100%;
                    outline: none;
                "
            >
                <option value="">-- BARKOD GİRİN --</option>
            </select>
        </div>

        <div>

            <label style="
                font-size:11px;
                color:#991b1b;
                font-weight:800;
            ">
                ÇIKILACAK LOTU SEÇİN
            </label>

            <select id="l" style="width:100%;"><option value="">-- ÜRÜN SEÇİN --</option></select>
            
        </div>

    </div>

    <div style="
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:15px;
        margin-bottom:20px;
    ">

        <div>

            <label style="color:#475569;">
                ÇIKIŞ YAPILACAK ADET
            </label>

            <input 
                type="number"
                inputmode="decimal"
                id="m"
                min="1"
                placeholder="Miktar giriniz..."
                style="
                    margin-bottom:0;
                    border:2px solid #e2e8f0;
                    font-weight:700;
                    width:100%;
                "
            >

            <small 
                id="stok_bilgi"
                style="
                    color:#dc2626;
                    font-size:11px;
                    font-weight:800;
                    display:block;
                    margin-top:6px;
                "
            ></small>

        </div>

        <div>
            <label style="color:#475569;">
                MÜŞTERİ 
            </label>

            <select id="n" style="width:100%; margin-bottom: 10px;" onchange="musteriSecimiKontrol(this.value)">
                <option value=""></option>
                
                <option value="YENI_EKLE" style="font-weight: bold; color: #3b82f6;">
                    + Yeni Müşteri Ekle
                </option>

                {% for m in musteriler %}
                <option value="{{ m.ad }}">
                    {{ m.ad }}
                </option>
                {% endfor %}
            </select>
            <br><br><br>
            <form id="yeni_musteri_formu" onsubmit="musteriEkle(event)" style="display: none; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="mus_input" placeholder="Müşteri Adı..." required style="flex: 1; height: 36px; font-size: 12px; padding: 0 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                <button type="submit" style="background: #3b82f6; color: white; height: 36px; padding: 0 15px; font-size: 11px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;">EKLE</button>
            </form>
        </div>

        <script>
            function musteriSecimiKontrol(secilenDeger) {
                const form = document.getElementById('yeni_musteri_formu');
                
                if (secilenDeger === 'YENI_EKLE') {
                    // Seçilirse formu senin tasarımınla (flex) göster
                    form.style.display = 'flex';
                } else {
                    // Farklı bir şey seçilirse formu gizle
                    form.style.display = 'none';
                }
            }

          
        </script>

    </div>

    <div>

        <label style="color:#475569;">
            ÇIKIŞ NOTU / AÇIKLAMA
        </label>

        <textarea 
            id="not"
            rows="2"
            placeholder="İşlemle ilgili not..."
            style="
                width:100%;
                padding:12px;
                border:2px solid #e2e8f0;
                border-radius:12px;
                margin-bottom:20px;
                font-family:inherit;
            "
        ></textarea>

    </div>

    <div style="display:flex; gap:10px;">
        <button onclick="sepeteEkle()" class="btn" style="flex:1; padding:15px; font-weight:800; background:#4f46e5; color:white; border-radius:14px; border:none; cursor:pointer;">➕ SEPETE EKLE</button>
        <button onclick="cikisYap()" class="btn" style="flex:1; padding:15px; font-weight:800; background:#dc2626; color:white; border-radius:14px; border:none; cursor:pointer;">🚀 İŞLEMİ TAMAMLA</button>
    </div>

</div>

    <div id="sepet-alani" class="card shadow-sm border-0 mb-4" style="border-radius:16px; display:none; background:#ffffff; border:1px solid #e2e8f0;">
        <div class="card-body p-3">
            <h5 style="color:#4f46e5; font-size: 1rem; font-weight:800; margin-bottom:10px;">🛒 SEPET (Picking List)</h5>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width: 40%;">ÜRÜN</th>
                            <th style="width: 20%;">LOT</th>
                            <th style="width: 20%;">MİKTAR</th>
                            <th style="width: 20%;">SİL</th>
                        </tr>
                    </thead>
                    <tbody id="sepet-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>


<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let barkodKayitlari = [];

$(document).ready(function() {

    function turkceMatcher(params, data) {
        if ($.trim(params.term) === '') {
            return data;
        }
        if (typeof data.text === 'undefined') {
            return null;
        }
        
        var aranan = params.term.toLocaleUpperCase('tr-TR');
        var metin = data.text.toLocaleUpperCase('tr-TR');
        
        if (metin.indexOf(aranan) > -1) {
            return data;
        }
        return null;
    }

    $('#u').select2({
        placeholder: "Ürün seçin veya barkod okutun...",
        allowClear: true,
        width: '100%',
        matcher: turkceMatcher
    });

    $('#l').select2({
        placeholder: "Önce Barkod Okutun",
        width: '100%'
    });

    $('#n').select2({
        tags: true,
        placeholder: "Sevk yeri veya müşteri seçin...",
        allowClear: true,
        width: '100%',
        matcher: turkceMatcher
    });

    // Otomatik lot kilitlemeyi kaldırdık. Sadece barkodu çeker.
    $('#u').on('change', function() {
        const barkod = $(this).val();
        if (barkod) {
            lotlariGetir(barkod);
        } else {
            formuSifirla();
        }
    });

    // Ürün ismi değiştiğinde lot mantığı
    $('#goster_isim').on('change', function() {
        const secilenIsim = $(this).val();
        const lotSelect = $('#l');
        
        lotSelect.empty();
        $('#stok_bilgi').html('');
        $('#m').val('');

        if (!secilenIsim) {
            lotSelect.append('<option value="">-- ÖNCE ÜRÜN SEÇİN --</option>');
            lotSelect.trigger('change');
            return;
        }

        const aitKayitlar = barkodKayitlari.filter(i => (i.isim || "İsimsiz Ürün") === secilenIsim);

        if (aitKayitlar.length > 0) {
            const siraliListe = aitKayitlar.sort((a, b) => a.miktar - b.miktar);

            if (siraliListe.length === 1) {
                // SADECE 1 LOT VARSA DİREKT SEÇ
                const item = siraliListe[0];
                const text = `LOT: ${item.lot || '-'} (Mevcut: ${item.miktar} Adet)`;
                let opt = new Option(text, item.lot, true, true);
                $(opt).data('stok', item.miktar);
                lotSelect.append(opt);
                lotSelect.trigger('change');
            } else {
                // BİRDEN FAZLA LOT VARSA KULLANICIYI SEÇİME ZORLA
                lotSelect.append('<option value="">-- LOT SEÇİN --</option>');
                siraliListe.forEach(item => {
                    const text = `LOT: ${item.lot || '-'} (Mevcut: ${item.miktar} Adet)`;
                    let opt = new Option(text, item.lot);
                    $(opt).data('stok', item.miktar);
                    lotSelect.append(opt);
                });
                lotSelect.trigger('change');
            }
        }
    });

    $('#l').on('change', function() {
        const seciliLot = $(this).find(':selected');
        const miktar = seciliLot.data('stok');

        // Boş seçim ("-- LOT SEÇİN --") yapıldığında stok bilgisini sil
        if (miktar !== undefined && $(this).val() !== "") {
            $('#stok_bilgi').html(`⚠️ GÜNCEL STOK: ${miktar} ADET`);
            $('#m').attr('max', miktar).focus();
        } else {
            $('#stok_bilgi').html('');
        }
    });
});


async function lotlariGetir(barkod) {
    const lotSelect = $('#l');
    const isimSelect = $('#goster_isim');
    
    lotSelect.empty().append('<option value="">Yükleniyor...</option>');
    isimSelect.empty().append('<option value="">Yükleniyor...</option>');

    try {
        const res = await fetch(`/barkod-detay/${barkod}`);
        const data = await res.json();
        
        isimSelect.empty();
        lotSelect.empty();
        
        barkodKayitlari = (data.liste && data.liste.length > 0) ? data.liste : [];

        if (barkodKayitlari.length > 0) {
            
            const benzersizIsimler = [...new Set(
                barkodKayitlari.map(i => i.isim || data.isim || "İsimsiz Ürün").filter(Boolean)
            )];

            // İlk seçeneği ekle (placeholder)
            isimSelect.append(new Option("-- ÜRÜN ADI SEÇİN --", "", false, false));

            benzersizIsimler.forEach(isim => {
                isimSelect.append(new Option(isim, isim, false, false));
            });

            // SADECE 1 İSİM VARSA DİREKT SEÇ, BİRDEN FAZLAYSA SEÇTİR
            if (benzersizIsimler.length === 1) {
                isimSelect.val(benzersizIsimler[0]).trigger('change');
            } else {
                isimSelect.trigger('change');
                lotSelect.empty().append('<option value="">-- ÜRÜN ADI SEÇİN --</option>').trigger('change');
            }

        } else {
            bildirim("⚠️ Ürün bulunamadı!", "error");
            formuSifirla();
        }

    } catch (e) {
        console.error(e);
        bildirim("Bağlantı hatası!", "error");
        formuSifirla();
    }
}


function formuSifirla() {
    barkodKayitlari = [];
    $('#goster_isim').empty().append('<option value="">-- BARKOD GİRİN --</option>');
    $('#stok_bilgi').html('');
    $('#l').empty().append('<option value="">-- ÜRÜN SEÇİN --</option>').trigger('change');
    $('#m').val('');
}


let sepet = [];

function sepeteEkle() {
    const barkod = $('#u').val();
    const isim = $('#goster_isim').val();
    const lot = $('#l').val();
    const miktar = parseInt($('#m').val());
    const maxStok = $('#l option:selected').data('stok');

    if(!barkod || !isim || !lot || !miktar || miktar > maxStok) return bildirim("Hatalı ürün veya miktar!", "error");
    
    sepet.push({ barkod, isim, lot, miktar });
    $('#sepet-alani').show();
    $('#sepet-tbody').append(`<tr data-index="${sepet.length-1}"><td>${isim}</td><td>${lot}</td><td>${miktar}</td><td><button onclick="sepettenSil(${sepet.length-1})" class="btn btn-sm btn-danger">X</button></td></tr>`);
    
    $('#m').val(''); 
    $('#u').val('').trigger('change');
    bildirim("Sepete eklendi!");
}

function sepettenSil(i) {
    sepet.splice(i, 1);
    $(`tr[data-index="${i}"]`).remove();
    if(sepet.length==0) $('#sepet-alani').hide();
}

async function cikisYap() {
    if(sepet.length==0) return bildirim("Sepet boş!", "error");
    const res = await fetch('/stok-cikisi-toplu', { 
        method: 'POST', headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ 
            urunler: sepet, 
            musteri: $('#n').val(),
            aciklama: $('#not').val() 
        })
    });
    if(res.ok) { 
        const d = await res.json(); 
        bildirim("İŞLEM NO: " + d.islem_no + " TAMAMLANDI"); 
        setTimeout(()=>location.reload(), 1200); 
    } else { 
        const e = await res.json(); bildirim(e.detail || "Hata!", "error"); 
    }
}


/* =========================
   KAMERA SİSTEMİ
========================= */

let html5QrCode = null;
let currentTrack = null;
let torchEnabled = false;
let zoomLevel = 2;
let focusInterval = null;
 
async function kameraKapat() {
    try {
        if (focusInterval) {
            clearInterval(focusInterval);
        }
        if (html5QrCode) {
            await html5QrCode.stop();
            await html5QrCode.clear();
        }
    } catch (e) {}

    html5QrCode = null;
    currentTrack = null;
    torchEnabled = false;

    document.getElementById("reader-wrapper").style.display = "none";
    document.getElementById("flashBtn").style.display = "none";
    document.getElementById("zoomBtn").style.display = "none";
}

async function kameraAc() {
    const wrapper = document.getElementById("reader-wrapper");
    if (html5QrCode) {
        return kameraKapat();
    }
    wrapper.style.display = "block";

    try {
        html5QrCode = new Html5Qrcode("reader");
        const devices = await Html5Qrcode.getCameras();
        if (!devices.length) {
            alert("Kamera bulunamadı");
            return;
        }

        let cameraId = devices[0].id;
        const backCamera = devices.find(device => {
            const label = device.label.toLowerCase();
            return (label.includes("back") || label.includes("rear") || label.includes("environment"));
        });

        if (backCamera) {
            cameraId = backCamera.id;
        }

        await html5QrCode.start(
            cameraId,
            {
                fps: 15,
                disableFlip: true,
                qrbox: (w, h) => {
                    const size = Math.min(w, h) * 0.72;
                    return { width: size, height: size };
                },
                aspectRatio: 1.777,
                videoConstraints: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    advanced: [
                        { focusMode: "continuous" },
                        { sharpness: 1 },
                        { contrast: 1 }
                    ]
                },
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            },
            async (decodedText) => {
                $('#u').val(decodedText).trigger('change');
                if (navigator.vibrate) navigator.vibrate(120);
                kameraKapat();
            },
            () => {}
        );

        setTimeout(async () => {
            try {
                const videoElement = document.querySelector("#reader video");
                if (!videoElement?.srcObject) return;

                currentTrack = videoElement.srcObject.getVideoTracks()[0];
                if (!currentTrack) return;

                const capabilities = currentTrack.getCapabilities();

                if (capabilities.focusMode) {
                    try {
                        await currentTrack.applyConstraints({
                            advanced: [{ focusMode: "continuous" }]
                        });
                    } catch (e) {}
                }

                if (capabilities.zoom) {
                    try {
                        if (capabilities.zoom.max && zoomLevel > capabilities.zoom.max) {
                            zoomLevel = capabilities.zoom.max;
                        }
                        await currentTrack.applyConstraints({
                            advanced: [{ zoom: zoomLevel }]
                        });
                        document.getElementById("zoomBtn").style.display = "block";
                    } catch (e) {}
                }

                if (capabilities.torch) {
                    document.getElementById("flashBtn").style.display = "block";
                }

                focusInterval = setInterval(async () => {
                    try {
                        if (!currentTrack) return;
                        await currentTrack.applyConstraints({
                            advanced: [{ focusMode: "continuous" }]
                        });
                    } catch (e) {}
                }, 2500);

            } catch (e) {
                console.log(e);
            }
        }, 1000);

    } catch (err) {
        console.error(err);
        alert("Kamera hatası: " + err);
        kameraKapat();
    }
}

async function flashDegistir() {
    if (!currentTrack) return;
    try {
        torchEnabled = !torchEnabled;
        await currentTrack.applyConstraints({
            advanced: [{ torch: torchEnabled }]
        });
        document.getElementById("flashBtn").innerHTML = torchEnabled ? "🔦 Flash Kapat" : "💡 Flash Aç";
    } catch (e) {
        console.log("Torch desteklenmiyor", e);
    }
}

async function zoomDegistir() {
    if (!currentTrack) return;
    try {
        const capabilities = currentTrack.getCapabilities();
        if (!capabilities.zoom) return;

        if (zoomLevel === 2) {
            zoomLevel = 3;
        } else if (zoomLevel === 3) {
            zoomLevel = 1;
        } else {
            zoomLevel = 2;
        }

        if (capabilities.zoom.max && zoomLevel > capabilities.zoom.max) {
            zoomLevel = capabilities.zoom.max;
        }

        await currentTrack.applyConstraints({
            advanced: [{ zoom: zoomLevel }]
        });

        try {
            await currentTrack.applyConstraints({
                advanced: [{ focusMode: "continuous" }]
            });
        } catch (e) {}

        document.getElementById("zoomBtn").innerHTML = `🔍 ${zoomLevel}x`;
    } catch (e) {
        console.log("Zoom desteklenmiyor", e);
    }
}

async function hizliEkle(url, ad) {
        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `ad=${encodeURIComponent(ad)}`
        });
        if(res.ok) location.reload(); else bildirim("Hata!", "error");
    }

function musteriEkle(e) { e.preventDefault(); hizliEkle('/musteri-ekle/', document.getElementById('mus_input').value); }

</script>

<style>

#reader-wrapper{
    width:100%;
    max-width:340px;
    margin:14px auto;
    position:relative;
    display:none;
}

#reader{
    width:100%;
    border-radius:16px;
    overflow:hidden;
    border:3px solid #4f46e5;
    background:#000;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

#reader video{
    width:100% !important;
    height:auto !important;
    object-fit:cover;
    border-radius:14px;
    transform:translateZ(0);
    backface-visibility:hidden;
}

#flashBtn,
#zoomBtn{
    position:absolute;
    z-index:999;
    border:none;
    border-radius:999px;
    background:rgba(0,0,0,.75);
    color:#fff;
    font-weight:700;
    backdrop-filter:blur(5px);
}

#flashBtn{
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    padding:8px 14px;
    font-size:13px;
    display:none;
}

#zoomBtn{
    top:10px;
    right:10px;
    padding:8px 12px;
    font-size:13px;
    display:none;
}

@media (max-width:768px){

    #reader-wrapper{
        max-width:300px !important;
    }

    #reader video{
        max-height:320px !important;
    }
}

/* Sepet Tablosu Düzenlemeleri */
#sepet-alani table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

#sepet-alani thead th {
    background-color: #f1f5f9;
    color: #475569;
    font-size: 0.85rem;
    font-weight: 700;
    text-align: center;
    padding: 10px;
}

#sepet-tbody td {
    padding: 12px 10px;
    text-align: center;
    vertical-align: middle;
    border-bottom: 1px solid #e2e8f0;
    font-size: 0.9rem;
    color: #334155;
}

/* Sil Butonu İyileştirmesi */
.btn-sm.btn-danger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 8px !important;
    font-weight: bold;
}




/* Select2 Kutusu İçindeki Yazı Rengi ve Kalınlığı */
.select2-container--default .select2-selection--single .select2-selection__rendered,
.select2-container--default .select2-selection--multiple .select2-selection__rendered {
    color: #334155 !important;
    font-weight: 600 !important;
}

/* Select2 Sağdaki Ok İşaretini Ortalama */
.select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 100% !important;
    top: 0 !important;
}



/* Inputlara tıklandığında (focus) etrafında canlı mavi bir ışık yansısın */
.select2-container--focus .select2-selection--single,
.select2-container--focus .select2-selection--multiple,
input:focus, textarea:focus {
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
    outline: none !important;
}

/* Açılan listenin ana paneli */
.select2-container--default .select2-results__options {
    background-color: #adade6 !important; /* Açılır listenin arka planı */
}

/* Seçili olan (üzerine gelinen) öğenin rengi */
.select2-container--default .select2-results__option--highlighted[aria-selected] {
