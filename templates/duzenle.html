{% extends "base.html" %}
{% block title %}Ürün Düzenle{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: auto;">
    <h2 style="margin-top: 0;">✏️ Ürün Bilgilerini Güncelle</h2>
    <p style="color: #7f8c8d; font-size: 14px;">Barkod: <b>{{ urun.barkod }}</b></p>
    
    <div style="display:flex; flex-direction:column; gap:18px; margin-top:20px;">
        <input type="hidden" id="b" value="{{ urun.barkod }}">
        
        <div>
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Ürün Adı</label>
            <input type="text" id="n" value="{{ urun.isim }}" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        </div>
        
        <div>
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Miktar</label>
            <input type="number" id="m" value="{{ urun.miktar }}" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        </div>
        
        <div>
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Kategori</label>
            <input type="text" id="k" list="k_list" value="{{ urun.kategori.ad }}" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            <datalist id="k_list">
                {% for kat in kategoriler %}<option value="{{ kat.ad }}">{% endfor %}
            </datalist>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="guncelle()" style="flex: 2; background:#2ed573; color:white; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 16px;">
                ✅ DEĞİŞİKLİKLERİ KAYDET
            </button>
            
            <button onclick="urunu_yok_et()" style="flex: 1; background:#ff4757; color:white; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 14px;">
                🗑️ SİL
            </button>
        </div>
        
        <div style="text-align: center;">
            <a href="/urun-listesi/" style="color: #7f8c8d; text-decoration: none; font-size: 14px;">Vazgeç ve Geri Dön</a>
        </div>
    </div>
</div>

<script>
    // GÜNCELLEME İŞLEMİ
    async function guncelle() {
        const d = {
            barkod: document.getElementById('b').value,
            isim: document.getElementById('n').value,
            miktar: parseInt(document.getElementById('m').value),
            kategori_ad: document.getElementById('k').value
        };
        const res = await fetch('/urunler/' + d.barkod, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(d)
        });
        if(res.ok) { 
            window.location.href="/urun-listesi/"; 
        } else {
            alert("Güncelleme sırasında hata oluştu!");
        }
    }

    // SİLME İŞLEMİ
    async function urunu_yok_et() {
        const barkod = document.getElementById('b').value;
        if(confirm(barkod + ' barkodlu ürün tamamen silinecek. Emin misiniz?')) {
            const res = await fetch('/urunler/' + barkod, {
                method: 'DELETE'
            });
            if(res.ok) {
                alert("Ürün başarıyla silindi.");
                window.location.href="/urun-listesi/";
            } else {
                alert("Silme işlemi başarısız!");
            }
        }
    }
</script>
{% endblock %}
