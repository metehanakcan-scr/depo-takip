<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Depo API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .register-container:hover {
            transform: translateY(-5px);
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        /* Şifre alanı ve göz ikonunu sarmalayan yeni güvenli container */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Göz ikonunun inputun içine tam oturması için sağ taraftan boşluk bırakıyoruz */
        .password-wrapper input {
            padding-right: 45px;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* Her zaman sabit duracak modern göz ikonu stili */
        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #a0aec0;
            transition: color 0.2s ease;
            z-index: 10;
            font-size: 16px;
        }

        .password-toggle-icon:hover {
            color: #667eea;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.2);
        }

        .btn-register:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #e53e3e;
            background-color: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #fed7d7;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Yeni Hesap Oluştur</h2>
        
        {% if hata %}
            <div class="error-msg">{{ hata }}</div>
        {% endif %}

        <form action="/kayit" method="POST" autocomplete="new-password">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" 
                    id="username" 
                    name="username" 
                    placeholder="KULLANICI ADINIZI SEÇİN" 
                    required 
                    autofocus
                    autocomplete="new-password"
                    style="text-transform: uppercase;"
                    oninput="this.value = this.value.toUpperCase();">
            </div>

            <div class="form-group">
                <label for="email">E-posta Adresi</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Güçlü bir şifre girin" required autocomplete="new-password">
                    <i class="fa-regular fa-eye password-toggle-icon" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-register">Kayıt Ol</button>
        </form>

        <div class="login-link">
            Zaten hesabınız var mı? <a href="/login/">Giriş Yap</a>
        </div>
    </div>

<script>
    // Göz ikonuna tıklanınca şifreyi göster/gizle motoru
    const togglePassword = document.querySelector("#togglePassword");
    const passwordInput = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
        // Tipi password ise text, text ise password yapıyoruz
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        
        // İkon şeklini değiştiriyoruz (açık göz / kapalı göz)
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
    });

    // Tarayıcı autofill temizleyicisi
    document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
            const inputs = document.querySelectorAll('.form-group input');
            inputs.forEach(input => {
                input.value = '';
            });
        }, 50);
    });
</script>

</body>
</html>
